name: Build site

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Install dependencies
        run: bundle install

      - name: Prepare website includes
        working-directory: ${{ github.workspace }}
        run: make website_build

      - name: Build the site
        run: bundle exec jekyll build

      - name: Finalise docs output
        working-directory: ${{ github.workspace }}
        run: |
          rm -rf docs
          mv website/_site docs
          cd website && rm -rf _includes
          touch docs/.nojekyll

      - name: Commit and push built site (master only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        working-directory: ${{ github.workspace }}
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/
          git diff --staged --quiet || git commit -m "Build website"
          git push
